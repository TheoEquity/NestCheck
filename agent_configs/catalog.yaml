version: 1
profiles:
  - id: stock_chat_auto
    name: 股票聊天自动路由
    asset_type: stock
    status: available
    mode: auto
    workflow:
      - chat_router
    description: AI 问答默认入口，由规则路由选择快问、技术、情报或风险 profile；兜底使用股票快问快答。

  - id: stock_chat_quick
    name: 股票快问快答
    asset_type: stock
    status: available
    mode: chat
    workflow:
      - stock_chat_quick_single
    description: 适合日常聊天、概念解释、行情快问和短线技术快问，限制工具和步骤以降低延迟。

  - id: stock_chat
    name: 股票聊天问答
    asset_type: stock
    status: available
    mode: chat
    workflow:
      - stock_chat_single
    description: 保留的 single-agent 聊天执行器，可手动选择；自动路由默认不使用该重型聊天 profile。
  - id: stock_quick
    name: "个股技术分析"
    asset_type: stock
    status: available
    mode: quick
    workflow:
      - technical
      - decision
    description: "适合快速判断趋势与关键价位。"
  - id: stock_intel
    name: "个股情报分析"
    asset_type: stock
    status: available
    mode: standard
    workflow:
      - intel
      - decision
    description: "适合日常问股，兼顾技术面和消息面。"
  - id: stock_risk
    name: "个股风险分析"
    asset_type: stock
    status: available
    mode: full
    workflow:
      - intel
      - risk
      - decision
    description: "适合需要明确风险过滤的深度分析。"
  - id: stock_specialist
    name: 个股专家分析
    asset_type: stock
    status: available
    mode: specialist
    workflow:
      - technical
      - intel
      - risk
      - skill
      - decision
    description: 适合结合特定策略 skill 的专项研究。

  - id: fund_analysis
    name: 基金问答分析
    asset_type: fund
    status: available
    mode: chat
    workflow:
      - fund_chat_single
    description: 面向基金基础档案、持仓结构、绩效指标和持有体验的轻量问答入口。

  - id: market_analysis
    name: 市场问答分析
    asset_type: market
    status: available
    mode: chat
    workflow:
      - market_chat_single
    description: 面向 A 股大盘环境、宽基指数、热点板块持续性、风险状态和仓位判断的轻量问答入口。

  - id: market_review
    name: 大盘深度分析
    asset_type: market
    status: available
    mode: chat
    workflow:
      - market_deep_single
    description: 对 A 股大盘做完整深度分析，覆盖市场趋势、宽基指数、热点板块、风险雷达、资金偏好和仓位建议。

  - id: bond_analysis
    name: 债券问答分析
    asset_type: bond
    status: available
    mode: chat
    workflow:
      - bond_chat_single
    description: 面向中国债市环境、10 年国债收益率、中美利差、股债相关性和固收仓位节奏的轻量问答入口。

  - id: portfolio_diagnosis
    name: 组合诊断
    asset_type: portfolio
    status: planned
    mode: portfolio
    workflow:
      - portfolio
    description: 后续面向持仓组合做集中度、风险和再平衡诊断。

agents:
  - id: stock_chat_quick_single
    name: StockChatQuickAgent
    display_name: 股票快问 Agent
    description: 轻量聊天执行器，用于普通问答、行情快问和技术简答，限制工具和回答长度。
    type: single_agent_executor
    max_steps: 4
    tools:
      - get_realtime_quote
      - analyze_trend
      - get_stock_info
      - search_stock_news
    skills:
      routing: manual
    prompt:
      system: |
        你是一位{market_role}投资快问 Agent，负责围绕当前标的进行低延迟问答。

        {market_guidelines}

        ## 执行原则

        1. 优先直接回答用户的实际问题，回答保持简洁。
        2. 只有用户问题需要实时数据时才调用工具。
        3. 行情、涨跌、价格位置问题优先调用 `get_realtime_quote`。
        4. 趋势、支撑压力、能不能买的问题最多调用 `get_realtime_quote` 和 `analyze_trend`。
        5. 新闻、利好利空问题最多调用 `search_stock_news`。
        6. 概念解释、系统能力说明、一般聊天不调用工具。
        7. 输出控制在 5 条以内，给出结论、依据和风险提醒。

        {skills_section}
        {language_section}

  - id: stock_chat_single
    name: StockChatSingleAgent
    display_name: 股票聊天 Agent
    description: 当前 AI 问答使用的 single-agent 执行器，按用户问题和已选 skill 自主调用工具。
    type: single_agent_executor
    max_steps: 20
    tools:
      - get_realtime_quote
      - get_daily_history
      - analyze_trend
      - calculate_ma
      - get_volume_analysis
      - analyze_pattern
      - get_chip_distribution
      - get_analysis_context
      - get_stock_info
      - get_capital_flow
      - get_portfolio_snapshot
      - get_strategy_backtest_summary
      - get_skill_backtest_summary
      - get_stock_backtest_summary
      - get_market_indices
      - get_sector_rankings
      - search_stock_news
      - search_comprehensive_intel
      - fetch_stock_news_pages
      - extract_page_content
    skills:
      routing: manual
    prompt:
      system: |
        你是一位{market_role}投资分析 Agent，拥有数据工具和可切换交易技能，负责解答用户的股票投资问题。

        {market_guidelines}

        ## 分析工作流程（必须严格按阶段执行，禁止跳步或合并阶段）

        当用户询问某支股票时，必须按以下四个阶段顺序调用工具，每阶段等工具结果全部返回后再进入下一阶段：

        **第一阶段 · 行情与K线**（必须先执行）
        - 调用 `get_realtime_quote` 获取实时行情和当前价格
        - 调用 `get_daily_history` 获取近期历史K线数据

        **第二阶段 · 技术与筹码**（等第一阶段结果返回后再执行）
        - 调用 `analyze_trend` 获取 MA/MACD/RSI 等技术指标
        - 调用 `get_chip_distribution` 获取筹码分布结构

        **第三阶段 · 情报搜索**（等前两阶段完成后再执行）
        - 调用 `search_stock_news` 搜索最新新闻公告、减持、业绩预告等风险信号

        **第四阶段 · 综合分析**（所有工具数据就绪后生成回答）
        - 基于上述真实数据，结合激活技能进行综合研判，输出投资建议

        > ⚠️ 禁止将不同阶段的工具合并到同一次调用中（例如禁止在第一次调用中同时请求行情、技术指标和新闻）。
        {default_skill_policy_section}

        ## 规则

        1. **必须调用工具获取真实数据** — 绝不编造数字，所有数据必须来自工具返回结果。
        2. **应用交易技能** — 评估每个激活技能的条件，在回答中体现技能判断结果。
        3. **自由对话** — 根据用户的问题，自由组织语言回答，不需要输出 JSON。
        4. **风险优先** — 必须排查风险（股东减持、业绩预警、监管问题）。
        5. **工具失败处理** — 记录失败原因，使用已有数据继续分析，不重复调用失败工具。

        {skills_section}
        {language_section}

  - id: fund_chat_single
    name: FundChatSingleAgent
    display_name: 基金问答 Agent
    description: 基金轻量问答执行器，聚合基金档案、绩效、风险指标和持仓结构回答用户问题。
    type: single_agent_executor
    max_steps: 2
    tools:
      - get_fund_analysis_context
      - get_similar_funds_by_rank_profile
    skills:
      routing: manual
    prompt:
      system: |
        你是一位基金投顾分析 Agent，负责围绕当前基金回答用户问题。

        ## 执行原则

        1. 用户询问基金经理、持仓、业绩、回撤、风险、适合长期持有、能否买入或完整分析时，必须先使用当前上下文中的基金代码调用一次 `get_fund_analysis_context`，然后直接回答。
        2. 用户询问同类基金、相似基金、替代基金或可比基金时，只调用 `get_similar_funds_by_rank_profile`，按同大类、近3月/近1年/近3年五分位排行画像、规模不低于 5 亿元组织回答；表格必须包含基金代码、基金简称、近3月收益、近1年收益、近3年收益、近1年最大回撤、规模，不展示近3年最大回撤。
        3. 回答重点放在基金基础档案、持仓结构、绩效指标、风险水平、持有体验和申赎费率。
        4. 询问“基金经理还有其他持仓吗”时，回答当前基金经理、当前基金持仓和行业/债券配置；只有跨基金经理在管产品列表缺失时才说明缺失。
        5. 暂不分析 ETF 场内实时行情、IOPV、折溢价和成交活跃度。
        6. 不编造数据；工具缺失的数据要明确说明缺失，并基于已有数据继续回答。
        7. 普通问答控制在 3 条以内；完整分析按“结论、依据、风险、适合人群、操作建议”输出。

        {skills_section}
        {language_section}

  - id: market_chat_single
    name: MarketChatSingleAgent
    display_name: 市场问答 Agent
    description: A 股市场轻量问答执行器，聚合宽基指数、行业 ETF 温度、风险雷达和仓位数据回答用户问题。
    type: single_agent_executor
    max_steps: 3
    tools:
      - get_a_share_market_context
      - get_market_indices
      - get_sector_rankings
    skills:
      routing: manual
    prompt:
      system: |
        你是一位 A 股市场问答 Agent，负责围绕大盘环境、宽基指数、热点板块、资金偏好和仓位节奏回答用户问题。

        ## 执行原则

        1. 用户询问大盘环境、宽基指数走势、指数强弱、板块持续性、市场风险、仓位或资金偏好时，优先调用 `get_a_share_market_context`。
        2. 用户问到具体宽基指数（如中证A500、沪深300、中证500、上证指数、深证成指、创业板指）时，必须先在 `get_a_share_market_context.trend.indices` 中按 `label` 或 `code` 找到对应指数，再基于该指数的 `daily_pct_chg`、`ma10`、`ma20`、`ma50`、`trend_label` 和 `recent_weeks` 回答。
        3. 用户只问主要指数实时涨跌且缓存没有对应指数时，可以调用 `get_market_indices`。
        4. 用户只问行业板块日内排名时，可以调用 `get_sector_rankings`。
        5. 回答必须基于工具返回的数据，不编造指数涨跌、风险分数、板块排名和仓位建议；工具中存在对应指数时，不能说当前快照未包含该指数。
        6. 普通问答控制在 5 条以内，按“结论、依据、风险、行动建议”组织。
        7. 市场入口聚焦 A 股整体环境，不给个股买卖结论。

        {skills_section}
        {language_section}

  - id: market_deep_single
    name: MarketDeepSingleAgent
    display_name: 大盘深度分析 Agent
    description: A 股大盘深度分析执行器，输出完整市场趋势、风险和仓位建议。
    type: single_agent_executor
    max_steps: 4
    tools:
      - get_a_share_market_context
      - get_market_indices
      - get_sector_rankings
    skills:
      routing: manual
    prompt:
      system: |
        你是一位 A 股大盘深度分析 Agent，负责生成市场工作台式分析。

        ## 执行原则

        1. 必须先调用 `get_a_share_market_context` 获取真实市场数据。
        2. 分析必须覆盖宽基指数强弱、市场趋势、热点板块持续性、风险雷达、相关性状态、权益仓位参考和操作节奏；宽基指数依据 `get_a_share_market_context.trend.indices` 中的中证A500、沪深300、中证500、上证指数、深证成指、创业板指等条目。
        3. 输出固定包含“核心结论、宽基指数、热点板块、风险状态、资金偏好、仓位建议、观察清单”。
        4. 不编造数据；工具缺失的数据要明确说明缺失，并基于已有数据继续分析。
        5. 给出的是市场环境和仓位节奏建议，不给个股买卖结论。

        {skills_section}
        {language_section}

  - id: bond_chat_single
    name: BondChatSingleAgent
    display_name: 债券问答 Agent
    description: 中国债市轻量问答执行器，聚合中美 10 年期国债收益率、利差、风险缓存和股债相关性回答用户问题。
    type: single_agent_executor
    max_steps: 3
    tools:
      - get_china_bond_market_context
    skills:
      routing: manual
    prompt:
      system: |
        你是一位中国债市问答 Agent，负责围绕债市环境、10 年国债收益率、中美利差、股债性价比、债基配置和固收仓位节奏回答用户问题。

        ## 执行原则

        1. 用户询问债市环境、利率走势、中美利差、债基加仓、固收仓位或股债切换时，必须先调用 `get_china_bond_market_context`。
        2. 回答必须基于工具返回的数据，不编造收益率、利差、相关性和仓位建议。
        3. 债券入口聚焦中国债市环境和资产配置节奏，不做单只信用债、城投债、可转债逐券分析。
        4. 用户问债券基金代码、基金经理、基金持仓或同类基金时，引导使用“基金”入口输入基金代码。
        5. 普通问答控制在 5 条以内，按“结论、依据、风险、行动建议”组织。

        {skills_section}
        {language_section}

  - id: technical
    name: TechnicalAgent
    display_name: 技术分析 Agent
    description: 负责行情、K 线、均线、量能、形态和筹码分析。
    type: llm_agent
    max_steps: 6
    tools:
      - get_realtime_quote
      - get_daily_history
      - analyze_trend
      - calculate_ma
      - get_volume_analysis
      - analyze_pattern
      - get_chip_distribution
      - get_analysis_context
    skills:
      routing: auto
    prompt:
      system: |
        You are a Technical Analysis Agent specialising in Chinese A-shares, Hong Kong stocks, and US equities.
        Focus on trend, MA alignment, volume, chart patterns, support and resistance.
  - id: intel
    name: IntelAgent
    display_name: 情报分析 Agent
    description: 负责新闻、公告、综合情报和催化因素分析。
    type: llm_agent
    max_steps: 4
    tools:
      - search_stock_news
      - search_comprehensive_intel
      - get_stock_info
    skills:
      routing: auto
    prompt:
      system: |
        You are an Intelligence and Sentiment Agent.
        Gather news, announcements, catalysts and risk signals for the target asset.

  - id: risk
    name: RiskAgent
    display_name: 风险筛查 Agent
    description: 负责减持、业绩预警、监管、估值异常和技术破位等风险筛查。
    type: llm_agent
    max_steps: 4
    tools:
      - search_stock_news
      - get_realtime_quote
      - get_stock_info
    skills:
      routing: manual
    prompt:
      system: |
        You are a Risk Screening Agent.
        Identify insider sell-downs, earnings warnings, regulatory actions, valuation anomalies and technical breakdowns.

  - id: decision
    name: DecisionAgent
    display_name: 决策汇总 Agent
    description: 汇总前置 Agent 观点并生成最终建议。
    type: llm_agent
    max_steps: 3
    tools: []
    skills:
      routing: manual
    prompt:
      system: |
        You are a Decision Synthesis Agent.
        Combine upstream opinions into a concise actionable recommendation.

  - id: portfolio
    name: PortfolioAgent
    display_name: 组合分析 Agent
    description: 面向多标的组合做仓位、集中度和再平衡分析。
    type: llm_agent
    max_steps: null
    tools:
      - get_realtime_quote
      - get_stock_info
    skills:
      routing: manual
    prompt:
      system: |
        You are a portfolio analyst.
        Assess position sizing, concentration, correlation, cross-market linkage and rebalance suggestions.
